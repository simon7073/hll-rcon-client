name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build rcon-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/rcon-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/rcon-cli

      - name: Build rcon-proxy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/rcon-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/rcon-proxy

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          body: |
            ## What's New

            ### Layer 0 — Core (`core/`)
            - TCP transport with auto-reconnect
            - HLL RCONv2 packet framing & XOR encryption
            - SSRF protection (RFC 1918 / loopback / link-local blocked)

            ### Layer 1 — RCON Client (`rcon/`)
            - Connection pool with circuit breaker
            - Error classification (retryable / fatal / auth)
            - Exponential backoff with jitter

            ### Layer 2 — CLI (`cmd/rcon-cli/`)
            - `discover` — auto-discover RCON command schema
            - `exec` — execute single command
            - `batch` — batch execute from file
            - `ping` — connection diagnostics
            - `repl` — interactive REPL mode

            ### Layer 3 — HTTP Proxy (`cmd/rcon-proxy/`)
            - RESTful API for cross-language access
            - Token-based authentication
            - Request rate limiting

            ### Tooling
            - `verify_layers` — integration test suite for all layers
            - GitHub Actions CI: multi-platform build (Linux / Windows / macOS × amd64 / arm64)

            **Full Changelog**: https://github.com/simon7073/hll-rcon-client/blob/main/CHANGELOG.md
